title: Githubactions
email: chantal@example.com
description: >-
  A personal website built with Jekyll and hosted on GitHub Pages.
  Exploring projects, blog posts, and more.
baseurl: ""
url: "https://Uchantal.github.io"

# Theme - using jekyll-remote-theme (not Minima)
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
