title: Githubactions
email: chantal@example.com
description: >-
  A personal website built with Jekyll and hosted on GitHub Pages.
  Exploring projects, blog posts, and more.
baseurl: "/Github_pages"
url: "https://Uchantal.github.io"

# Theme - Cayman (GitHub Pages supported theme, not Minima)
theme: jekyll-theme-cayman
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
